name: Deploy Convex

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'convex/**'
      - 'dashboard/**'
      - '.github/workflows/deploy-convex.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install dashboard dependencies
        run: bun install
        working-directory: dashboard

      - name: Build dashboard
        run: bun run build
        working-directory: dashboard

      # Deploys functions, schema, and crons to the Convex production
      # deployment selected by CONVEX_DEPLOY_KEY.
      - name: Deploy to Convex
        run: bunx convex deploy --yes
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

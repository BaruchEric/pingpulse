name: Release Client

on:
  push:
    tags:
      - 'client-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: pingpulse-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: pingpulse-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: pingpulse-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        run: pip3 install cargo-zigbuild

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.target }}
        working-directory: client

      - name: Package
        run: |
          cp client/target/${{ matrix.target }}/release/pingpulse pingpulse
          chmod +x pingpulse
          tar -czf ${{ matrix.name }}.tar.gz pingpulse

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pingpulse-darwin-arm64/pingpulse-darwin-arm64.tar.gz
            pingpulse-linux-amd64/pingpulse-linux-amd64.tar.gz
            pingpulse-linux-arm64/pingpulse-linux-arm64.tar.gz
          generate_release_notes: true

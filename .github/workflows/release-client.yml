name: Release Client

on:
  push:
    tags:
      - 'client-v*'
    branches:
      - master
    paths:
      - 'client/**'

permissions:
  contents: write

jobs:
  tag:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check.outputs.tag }}
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version and check tag
        id: check
        run: |
          version=$(grep '^version' client/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          tag="client-v${version}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "${tag}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag ${{ steps.check.outputs.tag }}
          git push origin ${{ steps.check.outputs.tag }}

  build:
    needs: [tag]
    if: always() && (needs.tag.result == 'skipped' || needs.tag.outputs.exists == 'false')
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: pingpulse-darwin-arm64
            cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: pingpulse-linux-amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: pingpulse-linux-arm64
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: pingpulse-windows-amd64
            cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        if: matrix.cross
        run: pip3 install cargo-zigbuild

      - name: Install Zig
        if: matrix.cross
        uses: goto-bus-stop/setup-zig@v2

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: client

      - name: Build (cross)
        if: matrix.cross
        run: cargo zigbuild --release --target ${{ matrix.target }}
        working-directory: client

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cp client/target/${{ matrix.target }}/release/pingpulse pingpulse
          chmod +x pingpulse
          tar -czf ${{ matrix.name }}.tar.gz pingpulse

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "client/target/${{ matrix.target }}/release/pingpulse.exe" "pingpulse.exe"
          Compress-Archive -Path "pingpulse.exe" -DestinationPath "${{ matrix.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ runner.os == 'Windows' && format('{0}.zip', matrix.name) || format('{0}.tar.gz', matrix.name) }}

  release:
    needs: [tag, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: resolve
        run: |
          if [ "${{ needs.tag.outputs.tag }}" != "" ]; then
            echo "tag=${{ needs.tag.outputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          files: |
            pingpulse-darwin-arm64/pingpulse-darwin-arm64.tar.gz
            pingpulse-linux-amd64/pingpulse-linux-amd64.tar.gz
            pingpulse-linux-arm64/pingpulse-linux-arm64.tar.gz
            pingpulse-windows-amd64/pingpulse-windows-amd64.zip
          generate_release_notes: true

name = "pingpulse"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "pingpulse-db"
database_id = "local"

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "pingpulse-archive"

[[analytics_engine_datasets]]
binding = "METRICS"
dataset = "pingpulse-metrics"

[durable_objects]
bindings = [
  { name = "CLIENT_MONITOR", class_name = "ClientMonitor" }
]

[[migrations]]
tag = "v1"
new_classes = ["ClientMonitor"]

[triggers]
crons = ["0 */6 * * *"]

routes = [
  { pattern = "ping.beric.ca", custom_domain = true }
]

[assets]
directory = "./dashboard/dist"

[vars]
ADMIN_JWT_SECRET = "change-me-in-secrets"
